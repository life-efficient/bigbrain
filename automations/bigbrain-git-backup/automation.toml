version = 1
id = "bigbrain-git-backup"
kind = "cron"
name = "BigBrain Git Backup"
prompt = "Back up the current BigBrain brain repo to its Git remote. First read `$CODEX_HOME/automations/bigbrain-git-backup/memory.md` if present; if `$CODEX_HOME` is empty, use `$HOME/.codex/automations/bigbrain-git-backup/memory.md`. From the workspace root, run `git status --short --branch`, then `git pull --rebase --autostash`, `git add -A`, and `git diff --cached --quiet`. If the diff command exits 0, report that the remote is up to date, there were no changes to back up, and do not commit. If it exits 1, run `git commit -m \"brain: automated backup\"` and then `git push`. Report whether the remote is up to date, whether a commit was created, and any warnings or errors. Before returning, append a concise run summary with the current UTC time to the automation memory file."
status = "ACTIVE"
rrule = "FREQ=DAILY;BYHOUR=4;BYMINUTE=20;BYSECOND=0"
model = "gpt-5.5"
reasoning_effort = "low"
execution_environment = "local"
cwds = ["<brain-home>"]
created_at = 1781173087000
updated_at = 1781203000000
