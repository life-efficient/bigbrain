version = 1
id = "bigbrain-frequent-sync"
kind = "cron"
name = "BigBrain Frequent Sync"
prompt = "Run `bigbrain sync --json` from the workspace root. Report whether the sync succeeded. Use the new sync schema in the user-facing report: first report `index_totals_after_sync` as current index totals after sync, then report `outstanding_work` as the remaining work, then report `run_work` as work completed during this run. Avoid legacy labels like `Indexed pages`, `Indexed links`, `Embeddings generated`, or `Embedding chunks generated` unless explicitly identifying them as backward-compatible raw fields. Include important warnings or errors."
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=45"
model = "gpt-5.5"
reasoning_effort = "low"
execution_environment = "local"
cwds = ["<brain-home>"]
created_at = 1779219712382
updated_at = 1781007770058
