version = 1
id = "bigbrain-check-update"
kind = "cron"
name = "BigBrain Check Update"
prompt = "Use the BigBrain: Check Update skill. From the BigBrain source repo, check whether the tracked upstream has a newer version. If an update is found, pull it with a safe rebase/autostash flow. Then check for newly bundled skills and automations; do not just report what was found. Install or refresh every safe skill and automation in the active runtime, reinstall or relink only when needed, and apply release filing-rule changes to the selected brain. If a brain filing-rule file still matches an older default, replace it with the new default; if it has custom user changes, merge in the new filing-rule changes while preserving the user's rules, and keep the user's rule on conflict. Verify that BigBrain works with tests, a CLI smoke check, skill/automation template health status, compiled filing_rules output, and the local MCP runtime when configured. If health shows missing or mismatched BigBrain-owned skills or automations, fix the active install and rerun health before reporting success. If the default brain pointer targets a stale temp path, repair it before continuing. For local MCP, report service health separately from Codex MCP registration: verify the launchd service, endpoint health, direct MCP tools/list, and codex mcp list when available. Report whether an update was found, previous and final HEAD, applied skills, applied automations, applied filing-rule updates, verification status, and any blockers. Do not discard local work or overwrite local skill/automation edits."
status = "ACTIVE"
rrule = "FREQ=DAILY;BYHOUR=4;BYMINUTE=15;BYSECOND=0"
model = "gpt-5.5"
reasoning_effort = "low"
execution_environment = "local"
cwds = ["<bigbrain-repo>"]
created_at = 1781010000000
updated_at = 1781010000000
