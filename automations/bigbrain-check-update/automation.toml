version = 1
id = "bigbrain-check-update"
kind = "cron"
name = "BigBrain Check Update"
prompt = "Use the BigBrain: Check Update skill. From the BigBrain source repo, check whether the tracked upstream has a newer version. If an update is found, pull it with a safe rebase/autostash flow, reinstall or relink only when needed, then verify that BigBrain works with tests and a CLI smoke check. Report whether an update was found, previous and final HEAD, verification status, and any blockers. Do not discard local work."
status = "ACTIVE"
rrule = "FREQ=DAILY;BYHOUR=4;BYMINUTE=15;BYSECOND=0"
model = "gpt-5.5"
reasoning_effort = "low"
execution_environment = "local"
cwds = ["<bigbrain-repo>"]
created_at = 1781010000000
updated_at = 1781010000000
