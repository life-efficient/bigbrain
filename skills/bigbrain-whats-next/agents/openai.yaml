interface:
  display_name: "BigBrain: What's Next"
  short_description: "Summarize the next in-progress and open BigBrain tasks as a concise numbered list"
  default_prompt: "Use BigBrain: What's Next to list matching BigBrain tasks through the MCP tasks/list tool, checking in_progress before open unless the user names a specific status. Return a concise numbered What's Next snapshot from tasks with readiness=ready and execution_mode=agent using human-readable task titles/actions rather than slugs, then append 'I also need your input on a few tasks:' with numbered readiness=underspecified, execution_mode=user, and execution_mode=interactive tasks plus their open questions or required user action, and offer to fan out handoff prompts for the agent-executable ready tasks."
