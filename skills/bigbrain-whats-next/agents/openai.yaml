interface:
  display_name: "BigBrain: What's Next"
  short_description: "Summarize the next in-progress and open BigBrain tasks as a concise numbered list"
  default_prompt: "Use BigBrain: What's Next to rank matching BigBrain tasks through the compact MCP tasks/summary tool, passing assignee=me and statuses=[in_progress,open] by default. Do not retrieve bodies, timelines, sources, markdown, or exact open-question text while discovering or ranking. Preserve open_questions_state exactly: present belongs under 'I also need your input on a few tasks:', missing is unknown and must not be promoted to autonomous ready work, and none may be ranked normally. Return a concise numbered snapshot from ready agent or interactive tasks using human-readable titles. Keep user-only and input-needed work separate, omit empty sections, and offer fanout. Only after the user selects tasks for handoff should the BigBrain Fanout Tasks workflow call tasks/get for each selected slug and recheck full body, timeline, sources, readiness, execution mode, and exact open questions."
