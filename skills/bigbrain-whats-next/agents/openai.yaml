interface:
  display_name: "BigBrain: What's Next"
  short_description: "Summarize the next in-progress and open BigBrain tasks as a concise numbered list"
  default_prompt: "Use BigBrain: What's Next to list matching BigBrain tasks through the MCP tasks/list tool, checking in_progress before open unless the user names a specific status. Treat readiness and execution_mode as hints, then read each task body: if Open Questions contains substantive questions, put the task under 'I also need your input on a few tasks:' even if frontmatter says ready, unless the task is clearly a guided interactive session meant to resolve those questions. Make clear that answers or additional input are for clarifying/enriching the task record, not permission to start execution in this same What's Next thread. Return a concise numbered What's Next snapshot from remaining tasks with readiness=ready and execution_mode=agent or execution_mode=interactive using human-readable task titles/actions rather than slugs. If and only if matching execution_mode=user tasks exist, append 'There are a few things I can't physically help with:' with the concrete user-only actions required. Omit empty sections entirely and do not mention that none were found. Offer to fan out autonomous prompts for agent tasks and guided step-by-step prompts for interactive tasks. Do not work on tasks in the same thread unless the user explicitly asks."
