interface:
  display_name: "BigBrain: Fanout Tasks"
  short_description: "Create handoff-ready prompts from currently discussed BigBrain task pages"
  default_prompt: "Use BigBrain: Fanout Tasks to fan out only the BigBrain tasks in the current conversation scope by default: tasks the user just named, task slugs/titles just created or discussed, selected task numbers from the immediately preceding What's Next snapshot, or an explicitly requested assignee/status/priority scope. Do not list and fan out the whole active queue merely because this skill was invoked. Whole-queue fanout is allowed only when the user explicitly asks for all ready/open/in-progress tasks, daily kickoff threads, or when this is the accepted follow-up to a BigBrain What's Next snapshot after fanout was offered. If there is no recoverable current task scope and no explicit broad scope, ask which tasks to fan out. Use the MCP tasks/list tool as the task source of truth, checking in_progress before open only for a resolved broad queue scope. Treat readiness and execution_mode as hints, then read each task body: if Open Questions contains substantive questions, keep the task out of prompt blocks and put it under Needs user action before fanout, unless the task is clearly a guided interactive session meant to resolve those questions. Return concise prompt blocks for remaining tasks with readiness=ready and execution_mode=agent or execution_mode=interactive. For execution_mode=agent, make an autonomous handoff prompt. For execution_mode=interactive, make a guided-session prompt that tells Codex to walk the user through the task step by step, ask for input at each decision point, and not proceed past a decision without the user's answer. Put readiness=underspecified, input-needed, and execution_mode=user tasks under Needs user action before fanout with their open questions or required user action. Make each prompt lead with a task-specific paragraph in plain language, not slug-heavy references. Put this reusable worker instruction paragraph after the task brief: 'Show me the result for approval once you finish the task. Once approved, update the brain, marking the task as done or in_progress, enriching related pages and their timelines, and noting the successor task if needed.' Include the source task slug only as a compact completion/update reference."
