interface:
  display_name: "BigBrain: Fanout Tasks"
  short_description: "Create handoff-ready prompts from BigBrain MCP task pages"
  default_prompt: "Use BigBrain: Fanout Tasks to list matching BigBrain tasks through the MCP tasks/list tool and return concise prompt blocks only for readiness=ready tasks. Put readiness=underspecified tasks under Needs input before fanout with their blocking questions. Make each prompt lead with a task-specific paragraph in plain language, not slug-heavy references. Put reusable worker instructions in a separate paragraph after the task-specific brief: show proposed work to the user before final action, update the brain with what happened, include the completion handoff rule, and finish by asking 'Anything you want changed, or should I update this in the brain?' Do not use slugs except for the final full-spec reference. End each prompt with 'Do not start working until you have read the full task spec in the BigBrain tasks/<slug>.'"
