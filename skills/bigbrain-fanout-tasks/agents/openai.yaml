interface:
  display_name: "BigBrain: Fanout Tasks"
  short_description: "Launch Codex threads from currently discussed BigBrain task pages"
  default_prompt: "Use BigBrain: Fanout Tasks to fan out only the selected or currently discussed BigBrain tasks. Resolve candidates with compact tasks/summary metadata and never fetch full content for unselected work. After the user-selected slug set is fixed, call tasks/get once per selected task and preserve its current full body, timeline, sources, assignees, readiness, execution mode, and exact Open Questions. Recheck those full records before handoff; keep substantive unresolved questions out of autonomous fanout unless the selected task is clearly a guided interactive session. Discover codex_app.create_thread, create one self-contained worker thread per eligible selected task, and return prompts only when explicitly requested or thread creation is unavailable. Put this reusable instruction after each task brief: 'Show me the result for approval once you finish the task. Once approved, update the brain, marking the task as done or in_progress, enriching related pages and their timelines, and noting the successor task if needed.' Include the source task slug only as a compact completion/update reference."
