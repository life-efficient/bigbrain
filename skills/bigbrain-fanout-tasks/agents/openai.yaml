interface:
  display_name: "BigBrain: Fanout Tasks"
  short_description: "Create handoff-ready prompts from BigBrain MCP task pages"
  default_prompt: "Use BigBrain: Fanout Tasks to list matching BigBrain tasks through the MCP tasks/list tool, checking in_progress before open unless the user names a specific status, and return concise prompt blocks for tasks with readiness=ready and execution_mode=agent or execution_mode=interactive. For execution_mode=agent, make an autonomous handoff prompt. For execution_mode=interactive, make a guided-session prompt that tells Codex to walk the user through the task step by step, ask for input at each decision point, and not proceed past a decision without the user's answer. Put readiness=underspecified and execution_mode=user tasks under Needs user action before fanout with their open questions or required user action. Make each prompt lead with a task-specific paragraph in plain language, not slug-heavy references. Put this reusable worker instruction paragraph after the task brief: 'Show me the result for approval once you finish the task. Once approved, update the brain, marking the task as done or in_progress, enriching related pages and their timelines, and noting the successor task if needed.' Do not use slugs except for the final full-spec reference. End each prompt with 'Do not start working until you have read the full task spec in the BigBrain tasks/<slug>.'"
