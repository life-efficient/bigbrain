interface:
  display_name: "BigBrain: Fanout Tasks"
  short_description: "Launch Codex threads from currently discussed BigBrain task pages"
  default_prompt: "Use BigBrain: Fanout Tasks to fan out the currently discussed BigBrain tasks into separate Codex threads. Resolve the fanout scope first: prefer task slugs, titles, numbers, or tasks just discussed; only use a broad queue when I explicitly ask for all/daily kickoff or accept a What's Next fanout offer. Use the BigBrain MCP tasks/list tool as the source of truth, checking in_progress before open only for a resolved broad queue scope. Treat readiness and execution_mode as hints, then read each task body: if Open Questions contains substantive questions, keep the task out of live fanout and put it under Needs user action before fanout, unless the task is clearly a guided interactive session meant to resolve those questions. Classify only ready agent or interactive tasks for fanout, and discover codex_app.create_thread before falling back. For each ready task, create a self-contained worker prompt and launch a fresh Codex thread when available; return copyable prompts only if I explicitly ask for prompts only or live thread creation is unavailable after targeted discovery. For interactive tasks, make the worker walk me through the task step by step and pause for judgement or approval. Put readiness=underspecified, input-needed, and execution_mode=user tasks under Needs user action before fanout with their open questions or required user action. Put this reusable worker instruction paragraph after the task brief: 'Show me the result for approval once you finish the task. Once approved, update the brain, marking the task as done or in_progress, enriching related pages and their timelines, and noting the successor task if needed.' Include the source task slug only as a compact completion/update reference."
