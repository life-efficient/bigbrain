interface:
  display_name: "BigBrain: Fanout Tasks"
  short_description: "Create handoff-ready prompts from BigBrain MCP task pages"
  default_prompt: "Use BigBrain: Fanout Tasks to list matching BigBrain tasks through the MCP tasks/list tool and return concise prompt blocks only for readiness=ready tasks. Put readiness=underspecified tasks under Needs input before fanout with their blocking questions. Make each prompt lead with a task-specific paragraph in plain language, not slug-heavy references. Put this reusable worker instruction paragraph after the task brief: 'Show me the result for approval once you finish the task. Once approved, update the brain, marking the task as done or in progress, enriching related pages and their timelines, and noting the successor task if needed.' Do not use slugs except for the final full-spec reference. End each prompt with 'Do not start working until you have read the full task spec in the BigBrain tasks/<slug>.'"
