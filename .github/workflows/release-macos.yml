name: Release macOS desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release-macos:
    runs-on: macos-14
    env:
      CSC_LINK: ${{ secrets.MACOS_CERTIFICATE_P12 }}
      CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          expected="v$(node -p "require('./package.json').version")"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected." >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Build signed and notarized universal macOS packages
        run: npm run desktop:dist -- --config.mac.notarize=true

      - name: Generate SHA-256 checksums
        working-directory: dist/electron
        run: shasum -a 256 BigBrain-*-mac-universal.dmg BigBrain-*-mac-universal.zip > SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BigBrain-${{ github.ref_name }}-macOS
          path: |
            dist/electron/BigBrain-*-mac-universal.dmg
            dist/electron/BigBrain-*-mac-universal.zip
            dist/electron/BigBrain-*-mac-universal.dmg.blockmap
            dist/electron/BigBrain-*-mac-universal.zip.blockmap
            dist/electron/latest-mac.yml
            dist/electron/SHA256SUMS.txt
          if-no-files-found: error

      - name: Attach packages to GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/electron/BigBrain-*-mac-universal.dmg \
              dist/electron/BigBrain-*-mac-universal.zip \
              dist/electron/BigBrain-*-mac-universal.dmg.blockmap \
              dist/electron/BigBrain-*-mac-universal.zip.blockmap \
              dist/electron/latest-mac.yml \
              dist/electron/SHA256SUMS.txt \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/electron/BigBrain-*-mac-universal.dmg \
              dist/electron/BigBrain-*-mac-universal.zip \
              dist/electron/BigBrain-*-mac-universal.dmg.blockmap \
              dist/electron/BigBrain-*-mac-universal.zip.blockmap \
              dist/electron/latest-mac.yml \
              dist/electron/SHA256SUMS.txt \
              --verify-tag \
              --generate-notes \
              --title "BigBrain $GITHUB_REF_NAME"
          fi

  release-server:
    name: Publish server image
    needs: release-macos
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release image tags
        id: image
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/$owner/bigbrain"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          {
            echo 'tags<<EOF'
            echo "$image:$version"
            if [[ "$version" != *-* ]]; then echo "$image:latest"; fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        run: |
          expected="v${{ steps.image.outputs.version }}"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $expected." >&2
            exit 1
          fi

      - name: Build and publish immutable server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/bundled-postgres/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.image.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            BIGBRAIN_BUILD_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
