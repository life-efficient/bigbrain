services:
  app:
    build:
      context: ../..
      dockerfile: deploy/bundled-postgres/Dockerfile
    environment:
      PORT: ${BIGBRAIN_SERVICE_PORT:-3333}
      BIGBRAIN_HOME: ${BIGBRAIN_HOME:-/brain}
      BIGBRAIN_CONFIG: ${BIGBRAIN_CONFIG:-/config/bigbrain.config.json}
      BIGBRAIN_MCP_AUTH_MODE: ${BIGBRAIN_MCP_AUTH_MODE:-oauth_allowlist}
      BIGBRAIN_MCP_PUBLIC_URL: ${BIGBRAIN_MCP_PUBLIC_URL:-http://127.0.0.1:3333}
      BIGBRAIN_MCP_SERVICE_NAME: ${BIGBRAIN_MCP_SERVICE_NAME:-BigBrain}
      BIGBRAIN_MCP_ALLOWED_EMAILS: ${BIGBRAIN_MCP_ALLOWED_EMAILS:-}
      BIGBRAIN_MCP_GOOGLE_CLIENT_ID: ${BIGBRAIN_MCP_GOOGLE_CLIENT_ID:-}
      BIGBRAIN_MCP_GOOGLE_CLIENT_SECRET: ${BIGBRAIN_MCP_GOOGLE_CLIENT_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://bigbrain:bigbrain@postgres:5432/bigbrain}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ${BIGBRAIN_MARKDOWN_REPO:-./brain}:/brain
      - ./bigbrain.config.json:/config/bigbrain.config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BIGBRAIN_SERVICE_PORT:-3333}:${BIGBRAIN_SERVICE_PORT:-3333}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3333) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bigbrain}
      POSTGRES_USER: ${POSTGRES_USER:-bigbrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bigbrain}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
