<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>BigBrain</title>
<style>
:root{font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color-scheme:dark;--bg:#18181b;--panel:#09090b;--surface:rgba(255,255,255,.03);--surface-muted:rgba(255,255,255,.07);--ink:#fafafa;--muted:#a1a1aa;--line:rgba(255,255,255,.1);--line-strong:rgba(255,255,255,.22);--danger:#fca5a5;--pre-ink:#f8fafc;background:var(--bg);color:var(--ink)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input{font:inherit;color:inherit}button{cursor:pointer}.hidden{display:none!important}
#onboarding{min-height:100vh;display:grid;grid-template-columns:280px 1fr;background:var(--bg)}.steps{background:var(--panel);color:var(--ink);padding:72px 32px;border-right:1px solid var(--line)}.brand{font-size:23px;font-weight:750;letter-spacing:-.02em;margin-bottom:60px}.step{color:var(--muted);padding:12px 0}.step.active{color:var(--ink);font-weight:650}.step.done:before{content:'✓ ';color:var(--muted)}.panel{display:grid;place-items:center;padding:48px;background:var(--bg)}.card{width:min(620px,100%)}h1{color:var(--ink);font-size:40px;letter-spacing:-1.5px;margin:0 0 12px}p{color:var(--muted);line-height:1.55}.field{margin:22px 0}.field label{display:block;color:var(--ink);font-weight:650;margin-bottom:8px}.field input{width:100%;border:1px solid var(--line);border-radius:9px;padding:13px;background:var(--surface);outline:none}.field input::placeholder{color:#71717a}.field input:hover{border-color:var(--line-strong)}.field input:focus{border-color:var(--line-strong);box-shadow:0 0 0 3px rgba(255,255,255,.08)}.choice{border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:18px;transition:background 140ms ease,border-color 140ms ease,transform 140ms ease}.choice+.choice{margin-top:12px}.choice-option{display:block;width:100%;text-align:left;color:var(--ink)}.choice-option:hover,.choice-option:focus-visible{border-color:var(--line-strong);background:var(--surface-muted);transform:translateY(-1px);outline:none}.choice-option strong{font-size:15px}.choice-option p{margin-bottom:0}.badge{background:var(--surface-muted);color:var(--ink);border:1px solid var(--line);border-radius:99px;padding:3px 8px;font-size:12px}.credential-options{margin:20px 0 0;padding:0;border:0}.credential-options legend{color:var(--muted);font-size:12px;font-weight:650;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}.credential-option{width:100%;display:flex;align-items:center;justify-content:space-between;gap:16px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--ink);padding:13px;text-align:left;outline:none}.credential-option+.credential-option{margin-top:8px}.credential-option:hover,.credential-option:focus-visible{border-color:var(--line-strong);background:var(--surface-muted)}.credential-option.selected{border-color:#fafafa;box-shadow:0 0 0 1px #fafafa}.credential-option span:first-child{min-width:0}.credential-option strong,.credential-option small{display:block}.credential-option small{color:var(--muted);margin-top:4px}.credential-mask{flex:0 0 auto;color:var(--muted);font-size:12px}.credential-status,.credential-note{color:var(--muted);border:1px solid var(--line);border-radius:9px;padding:13px;margin-top:18px}.credential-options .field{margin:12px 0 0}.actions{display:flex;justify-content:space-between;gap:12px;margin-top:30px}.primary,.secondary{border-radius:9px;padding:11px 16px;transition:background 140ms ease,border-color 140ms ease,transform 140ms ease}.primary{border:1px solid #fafafa;background:#fafafa;color:#18181b;font-weight:650}.primary:hover,.primary:focus-visible{background:#fff;border-color:#fff;transform:translateY(-1px);outline:none}.primary:disabled{cursor:default;opacity:.55;transform:none}.secondary{border:1px solid var(--line);background:var(--surface);color:var(--ink)}.secondary:hover,.secondary:focus-visible{border-color:var(--line-strong);background:var(--surface-muted);outline:none}.error{color:var(--danger);background:rgba(127,29,29,.2);border:1px solid rgba(252,165,165,.24);padding:12px;border-radius:8px;margin-top:14px}
#app{position:relative;height:100vh;display:grid;grid-template-rows:30px 1fr;background:var(--bg)}.title-strip{-webkit-app-region:drag;background:var(--bg)}.tabs{position:absolute;z-index:3;top:50px;left:20px;transition:opacity 120ms ease}.tabs.dashboard-loading{opacity:0;pointer-events:none}.brain-select-wrap{position:relative}.brain-trigger{width:190px;height:38px;display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--line);border-radius:999px;background:var(--surface);color:var(--ink);padding:0 14px;font-size:13px;font-weight:500;box-shadow:0 6px 18px rgba(0,0,0,.12);outline:none}.brain-trigger:hover,.brain-trigger[aria-expanded="true"]{border-color:var(--line-strong);background:var(--surface-muted)}.brain-trigger:focus-visible{box-shadow:0 0 0 2px rgba(255,255,255,.12)}.select-chevron{flex:0 0 auto;width:7px;height:7px;border-right:1.5px solid var(--muted);border-bottom:1.5px solid var(--muted);transform:translateY(-2px) rotate(45deg)}.brain-menu{position:absolute;top:44px;left:0;width:220px;padding:5px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:#27272a;color:var(--ink);box-shadow:0 18px 45px rgba(0,0,0,.4)}.brain-menu button{width:100%;height:34px;display:flex;align-items:center;justify-content:space-between;border:0;border-radius:6px;background:transparent;color:#f4f4f5;padding:0 9px;text-align:left;font-size:13px;outline:none}.brain-menu button:hover,.brain-menu button:focus-visible{background:rgba(255,255,255,.08)}.menu-check{color:#d4d4d8}.menu-separator{height:1px;margin:5px -1px;background:var(--line)}.update-control{position:absolute;z-index:3;right:18px;bottom:18px;width:245px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#27272a;box-shadow:0 12px 35px rgba(0,0,0,.35);font-size:12px}.update-control strong,.update-control small{display:block}.update-control small{color:var(--muted);margin-top:3px;line-height:1.35}.update-control button{width:100%;margin-top:9px;border:1px solid var(--line-strong);border-radius:7px;background:var(--surface-muted);padding:7px;color:var(--ink)}.update-control button:hover,.update-control button:focus-visible{background:rgba(255,255,255,.12);outline:none}.update-control button:disabled{opacity:.55;cursor:default}.content iframe{width:100%;height:100%;border:0}.empty{display:grid;place-items:center;height:100%}.copybox{white-space:pre-wrap;background:var(--panel);color:var(--pre-ink);border:1px solid var(--line);padding:14px;border-radius:8px;position:relative}.warning{background:rgba(120,83,23,.18);border:1px solid rgba(251,191,36,.18);padding:14px;border-radius:8px;color:#f5d78e}.existing-box{border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:14px;background:var(--surface)}.existing-box strong{display:block}.existing-box small{display:block;color:var(--muted);margin-top:5px;word-break:break-all}details{margin-top:12px}summary{color:var(--muted);cursor:pointer;margin-bottom:8px}
@media(max-width:760px){#onboarding{grid-template-columns:1fr;grid-template-rows:auto 1fr}.steps{display:flex;align-items:center;gap:14px;padding:34px 24px 14px;overflow-x:auto;border-right:0;border-bottom:1px solid var(--line)}.brand{margin:0 auto 0 0}.step{font-size:12px;white-space:nowrap}.panel{place-items:start stretch;padding:36px 24px}h1{font-size:34px}}
</style></head><body>
<main id="onboarding"><aside class="steps"><div class="brand">BigBrain</div><div class="step active">1. Choose setup</div><div class="step">2. Details</div><div class="step">3. Brain</div><div class="step">4. Connect</div><div class="step">5. Ready</div></aside><section class="panel"><div class="card" id="step-content"></div></section></main>
<main id="app" class="hidden"><div class="title-strip" aria-hidden="true"></div><nav class="tabs" id="tabs"></nav><section class="content" id="content"></section><aside class="update-control hidden" id="update-control" aria-live="polite"></aside></main>
<script src="desktop.js"></script></body></html>
