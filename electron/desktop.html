<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>BigBrain</title>
<style>
:root{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#17211c;background:#f2f4ef}*{box-sizing:border-box}body{margin:0}button,input{font:inherit}button{cursor:pointer}.hidden{display:none!important}
#onboarding{min-height:100vh;display:grid;grid-template-columns:280px 1fr}.steps{background:#17211c;color:white;padding:72px 32px}.brand{font-size:23px;font-weight:750;margin-bottom:60px}.step{opacity:.45;padding:12px 0}.step.active{opacity:1}.step.done:before{content:'✓ '}.panel{display:grid;place-items:center;padding:48px}.card{width:min(620px,100%)}h1{font-size:40px;letter-spacing:-1.5px;margin:0 0 12px}p{color:#5e685f;line-height:1.55}.field{margin:22px 0}.field label{display:block;font-weight:650;margin-bottom:8px}.field input{width:100%;border:1px solid #c9d0c8;border-radius:9px;padding:13px;background:white}.choice{border:2px solid #377652;background:#f4fff7;border-radius:12px;padding:18px}.badge{background:#d9f6e2;color:#205d39;border-radius:99px;padding:3px 8px;font-size:12px}.actions{display:flex;justify-content:space-between;margin-top:30px}.primary{border:0;background:#207146;color:white;border-radius:9px;padding:12px 18px}.secondary{border:1px solid #ccd2cb;background:white;border-radius:9px;padding:10px 14px}.error{color:#a52626;background:#fff0f0;padding:12px;border-radius:8px;margin-top:14px}
#app{position:relative;height:100vh;display:grid;grid-template-rows:30px 1fr;background:#18181b}.title-strip{-webkit-app-region:drag;background:#18181b}.tabs{position:absolute;z-index:3;top:50px;left:20px;transition:opacity 120ms ease}.tabs.dashboard-loading{opacity:0;pointer-events:none}.brain-select-wrap{position:relative}.brain-trigger{width:190px;height:38px;display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid rgba(255,255,255,.1);border-radius:999px;background:rgba(255,255,255,.03);color:#fafafa;padding:0 14px;font-size:13px;font-weight:500;box-shadow:0 6px 18px rgba(0,0,0,.12);outline:none}.brain-trigger:hover,.brain-trigger[aria-expanded="true"]{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.07)}.brain-trigger:focus-visible{box-shadow:0 0 0 2px rgba(255,255,255,.12)}.select-chevron{flex:0 0 auto;width:7px;height:7px;border-right:1.5px solid #a1a1aa;border-bottom:1.5px solid #a1a1aa;transform:translateY(-2px) rotate(45deg)}.brain-menu{position:absolute;top:44px;left:0;width:220px;padding:5px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:#27272a;color:#fafafa;box-shadow:0 18px 45px rgba(0,0,0,.4)}.brain-menu button{width:100%;height:34px;display:flex;align-items:center;justify-content:space-between;border:0;border-radius:6px;background:transparent;color:#f4f4f5;padding:0 9px;text-align:left;font-size:13px;outline:none}.brain-menu button:hover,.brain-menu button:focus-visible{background:rgba(255,255,255,.08)}.menu-check{color:#d4d4d8}.menu-separator{height:1px;margin:5px -1px;background:rgba(255,255,255,.1)}.content iframe{width:100%;height:100%;border:0}.empty{display:grid;place-items:center;height:100%}.copybox{white-space:pre-wrap;background:#17211c;color:#e9f5ed;padding:14px;border-radius:8px;position:relative}.warning{background:#fff7d6;padding:14px;border-radius:8px;color:#685916}.existing-box{border:1px solid #c9d0c8;border-radius:10px;padding:14px;margin-top:14px;background:white}.existing-box strong{display:block}.existing-box small{display:block;color:#667268;margin-top:5px;word-break:break-all}
</style></head><body>
<main id="onboarding"><aside class="steps"><div class="brand">BigBrain</div><div class="step active">1. Your identity</div><div class="step">2. Brain name</div><div class="step">3. Mode</div><div class="step">4. AI access</div><div class="step">5. Connect</div></aside><section class="panel"><div class="card" id="step-content"></div></section></main>
<main id="app" class="hidden"><div class="title-strip" aria-hidden="true"></div><nav class="tabs" id="tabs"></nav><section class="content" id="content"></section></main>
<script src="desktop.js"></script></body></html>
